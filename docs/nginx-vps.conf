# =============================================================
# Nginx — CantinaSmart VPS
# Frontend : https://appcn.vgalimentacaocoletiva.com.br
# Backend  : https://cnapi.vgalimentacaocoletiva.com.br
# =============================================================

# ---- API Backend ----
server {
    listen 443 ssl;
    server_name cnapi.vgalimentacaocoletiva.com.br;

    ssl_certificate     /etc/letsencrypt/live/cnapi.vgalimentacaocoletiva.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnapi.vgalimentacaocoletiva.com.br/privkey.pem;

    location / {
        # Responde ao preflight OPTIONS ANTES de chegar no Node
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://appcn.vgalimentacaocoletiva.com.br" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-idempotency-key, X-Idempotency-Key" always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Content-Length               0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Não deixe o nginx adicionar Access-Control-Allow-Origin duplicado
        # (o Node já envia via código)
        proxy_hide_header  Access-Control-Allow-Origin;
        add_header         Access-Control-Allow-Origin "https://appcn.vgalimentacaocoletiva.com.br" always;
    }
}

# ---- Frontend (React SPA) ----
server {
    listen 443 ssl;
    server_name appcn.vgalimentacaocoletiva.com.br;

    ssl_certificate     /etc/letsencrypt/live/appcn.vgalimentacaocoletiva.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appcn.vgalimentacaocoletiva.com.br/privkey.pem;

    root /var/www/cantina-smart/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name appcn.vgalimentacaocoletiva.com.br cnapi.vgalimentacaocoletiva.com.br;
    return 301 https://$host$request_uri;
}
